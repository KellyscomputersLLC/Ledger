# Builds Ledger for Linux, Windows, and macOS (Intel + Apple Silicon).
#
# Triggers:
#   - push a tag like v1.0.0  -> builds all four, then attaches them to the
#     matching GitHub Release
#   - "Run workflow" button   -> builds all four so you can download and test
#     them from the run's Artifacts, without cutting a release
#
# Action versions below are current and stable as of mid-2026; bumping to the
# newest majors (checkout@v6, setup-python@v6, upload/download-artifact@v5+) is
# a drop-in change if you prefer to track latest.

name: Build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # required to attach files to a Release

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    # Optional Windows code-signing. These map from repo secrets; when the
    # secrets are absent they are empty strings and the signing steps below
    # skip themselves, so the build still succeeds (just unsigned). Add the two
    # secrets when you have a certificate (see PACKAGING.md → Code signing).
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # older glibc -> runs on more Linux distros
            artifact: Ledger-linux-x64
          - os: windows-latest
            artifact: Ledger-windows-x64
          - os: macos-13            # Intel Macs
            artifact: Ledger-macos-x64
          - os: macos-latest        # Apple Silicon (arm64)
            artifact: Ledger-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Usually unnecessary (the setup-python interpreter ships Tcl/Tk), but
      # harmless and saves a confusing failure if a runner image lacks it.
      - name: Ensure Tk is present (Linux build host)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tk

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller ledger.spec --noconfirm

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cd dist && tar -czf "../${{ matrix.artifact }}.tar.gz" Ledger

      - name: Sign Ledger.exe (optional — only if WINDOWS_PFX_* secrets are set)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $st = (Get-ChildItem "${Env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                 Sort-Object FullName | Select-Object -Last 1).FullName
          & $st sign /f $pfx /p "$env:WINDOWS_PFX_PASSWORD" /fd sha256 `
                /tr http://timestamp.digicert.com /td sha256 "dist\Ledger.exe"
          if ($LASTEXITCODE -ne 0) { throw "signing Ledger.exe failed ($LASTEXITCODE)" }
          Remove-Item $pfx -Force

      - name: Package (Windows) — portable exe + Setup.exe installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1) keep a portable single-file exe for people who don't want an installer
          Compress-Archive -Path dist/Ledger.exe -DestinationPath "${{ matrix.artifact }}-portable.zip"
          # 2) build the friendly installer with Inno Setup
          choco install innosetup -y --no-progress
          $iscc = "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer\windows\Ledger.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed ($LASTEXITCODE)" }

      - name: Sign the installer (optional — only if WINDOWS_PFX_* secrets are set)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $st = (Get-ChildItem "${Env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                 Sort-Object FullName | Select-Object -Last 1).FullName
          Get-ChildItem Output\*.exe | ForEach-Object {
            & $st sign /f $pfx /p "$env:WINDOWS_PFX_PASSWORD" /fd sha256 `
                  /tr http://timestamp.digicert.com /td sha256 $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "signing installer failed ($LASTEXITCODE)" }
          }
          Remove-Item $pfx -Force

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cd dist && zip -r "../${{ matrix.artifact }}.zip" Ledger.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.tar.gz
            Output/*.exe
          if-no-files-found: error

  release:
    name: Attach builds to the Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
